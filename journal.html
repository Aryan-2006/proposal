        body {

            background-attachment: fixed;
            background-repeat: no-repeat;
            transition: background-color 1s ease;

        .serif-font { font-family: 'Playfair Display', serif; }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }

        .readable-title {
            text-shadow: 0px 0px 12px rgba(253, 251, 247, 1), 0px 0px 6px rgba(253, 251, 247, 0.8);
        }

        /* --- FLOATING KEYFRAMES --- */
        @keyframes floatLeft { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
        @keyframes floatRight { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        @keyframes floatCenter { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }

        .animate-float-left { animation: floatLeft 6s ease-in-out infinite; }
        .animate-float-right { animation: floatRight 7s ease-in-out infinite; }
        .animate-float-center { animation: floatCenter 8s ease-in-out infinite; }

        .preserve-3d { transition: transform 0.5s ease-out; }

        /* --- 3D GIFT BOX ENGINE --- */
        .box-container {
            width: 140px;
            height: 140px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(45deg);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .box-container:active {
            transform: rotateX(-20deg) rotateY(45deg) scale(0.92);
        }
        .box-face {
            position: absolute;
            width: 140px;
            height: 140px;
            border: 2px solid #a78bfa;
            background: rgba(147, 51, 234, 0.7);
            backdrop-filter: blur(4px);
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.2);
        }
        .face-front  { transform: translateZ(70px); }
        .face-back   { transform: rotateY(180deg) translateZ(70px); }
        .face-right  { transform: rotateY(90deg) translateZ(70px); }
        .face-left   { transform: rotateY(-90deg) translateZ(70px); }
        .face-top    { transform: rotateX(90deg) translateZ(70px); height: 140px; background: rgba(168, 85, 247, 0.85); }
        .face-bottom { transform: rotateX(-90deg) translateZ(70px); height: 140px; }

        .heart-mask-fill {
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- INFINITE SCROLL WALL CONTAINER --- */
        #photo-wall-stream {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            padding: 40px 16px 140px 16px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.5s ease-out;
            margin: 0 auto;
        }
        .letter-paper {
    background-image: url('./images/download (13).jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-blend-mode: multiply;
    background-color: rgba(253, 251, 247, 0.95);
    border: 1px solid #dcd3c1;
}

        /* High-velocity explosive particle particles */
        .burst-picture {
            position: fixed;
            width: 140px;
            padding: 8px;
            padding-bottom: 28px;
            background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,0,0,0.05);
            opacity: 0;
            z-index: 40;
            pointer-events: none;
        }
    </style>

    <script>
        // Array maps smoothly up to 200 items loop
        const totalPhotosCount = 200;
        const photoURLs = [];
        for (let i = 1; i <= totalPhotosCount; i++) {
            // This will now properly count: pic1.jpg, pic2.jpg, pic3.jpg... all the way to pic200.jpg
            photoURLs.push(`pic${i}.jpg`);
        }

        const lettersContent = {
    1: "Dear Nandika,\n\nMy dear babbu, I find myself writing this while thinking about the thousands of kilometers between us. It’s funny—when I look back at where we started, I never imagined that someone 2,000 km away would become the person I want to talk to the moment I wake up and the last person I want to hear before I sleep. I cherish the moments we spend just sitting on a call, doing nothing, or watching a movie in silence. In a world that is always so loud, your silence is the most comfortable thing I’ve ever known. It makes the distance feel so small. Thank you for being my first real love. This letter is just a small start to all the words I’ve been holding onto. Always yours, Aryan",
    2: "Dear Nandika,\n\nThey say life is made of big moments, but lately, I’ve realized it’s actually made of the small ones—the ones you’ve completely redefined for me. My day doesn’t officially start until I see that first message from you. It’s become a rhythm I didn't know I needed; a quiet, grounding anchor in the middle of all my work and studies. Whether it’s a random thought you had, a song you’re listening to, or just a “good morning” that makes the day ahead feel a little brighter, those little digital pings are the highlights of my schedule. I find myself pausing throughout the day to wonder what you’re doing or to share something silly with you because I know you’re the only one who will understand exactly why it’s funny. You’ve changed the way I experience the hours—I’m no longer just moving through a checklist; I’m moving toward the next time I get to talk to you. Thank you for being my favorite habit. I never knew routine could feel this much like home.",
    3: "Dear Nandika,\n\nI won’t pretend that 2,000 kilometers is easy. Some days, it feels like a heavy weight—a gap that I wish I could bridge in a heartbeat just to see you, to hear your voice without a screen in the way, or to share a real laugh instead of a digital one. But then I look at us. We are building something that doesn’t rely on being in the same room. We’re building it on trust, on patience, and on the way we handle the quiet moments. Most people give up the moment things get difficult, but the distance just makes me realize how much you are worth the wait. Every kilometer between us is just a reminder of how much closer we’re going to be when we finally meet. That first time I get to see you in person—not in a frame, not in a call, but right there in front of me—is going to be the best day of my life. I think about it often, and that thought alone makes every single day of 'waiting' feel like a step toward a treasure. Distance is just a test, and I’m so proud that we’re passing it together.",
    4: "Dear Nandika,\n\nIf someone watched us, they might think we’re bored. They’d see two people miles apart, phones connected, neither of us saying a word for minutes at a time. But they wouldn't understand that for me, those are the loudest moments of my day. There is a specific kind of peace in our silence. It’s not the awkward kind—it’s the kind where I don’t feel the need to fill the space with chatter or perform for you. It’s just us, being. In those moments, I feel like the distance between us vanishes entirely. I can hear you breathing, I can hear the subtle movements in your room, and I feel like you’re sitting right next to me. It’s my favorite 'thing' about us. I think it’s the ultimate sign of comfort—that we’ve reached a place where simply knowing you are there is enough. You don’t have to entertain me, and I don’t have to impress you. We just get to exist in the same orbit, even when the map says we shouldn’t be. Thank you for sharing your quiet with me. It’s the most beautiful conversation we have.",
    5: "Dear Nandika,\n\nI spend so much time talking to you, but I don’t think I tell you often enough how much I admire the person you are when you aren’t even trying. I admire the way your mind works—the way you process the world, the things you care about, and how thoughtful you are about everything you do. It’s not just your intelligence that keeps me captivated; it’s your kindness. I’ve seen how you handle things, and I’ve seen how you handle me—with a level of patience and grace that I’m still learning to mirror. There are moments when I’m overwhelmed, or when life feels like a bit much, and you have this incredible way of just centering me. You don’t just listen; you understand. You handle my stresses and my quirks as if they were just part of the landscape, never making me feel like I’m a burden. I’ve learned so much about what it means to be a good human being just by watching how you move through the world. You’re more than just my partner; you’re the person I look up to. Thank you for being the kind of woman who makes me want to be the best version of myself every single day.",
    6: "Dear Nandika,\n\nWe’re at this strange, beautiful age—twenty—where everything feels like it’s both starting and ending at the same time. We’re figuring out our degrees, mapping out our future careers, and trying to understand the kind of people we want to be. I know there are days when the pressure of it all feels heavy, and the questions about what comes next seem endless. But when I think about my future, I don’t feel that same anxiety. I actually feel a sense of relief, because I know that no matter where my studies in data analysis take me, or where your path leads, we are building a foundation that can handle it all. I’m so excited for us—not just for the success we’ll chase, but for the growth we’ll share. I want to see you hit your goals, and I hope I get to be the one cheering the loudest when you do. Whether it’s me in Germany or us finding our way to the same corner of the world, I know that our future isn't just about what we achieve, but about who we become together. The road ahead is long, but I’ve never been more excited to travel it than I am knowing you’re waiting at the finish line.",
    7: "Dear Nandika,\n\nI look at the life I want for us, and I have to be honest with you: I am not the perfect partner. I know I can be the most stubborn, the most childlike, and at times, the most foolish person you’ve ever met. I cannot promise you a life without tears, and I cannot promise that I will never be the reason for your sadness. That would be a lie, and you deserve nothing but the truth from me. What I can promise you is this: I will never stop choosing you. I have chosen you since day one, and I will choose you every single day for the rest of my life. Even when things get hard, even when we are at our worst, I will never let go of your hand. My biggest nightmare is the thought of being the one who makes you cry. It breaks my heart that my own actions have caused you pain, and I carry the weight of every harsh decision and every regret. I know I cannot undo the past, and I know I have made you feel less than comfortable at times. That fear—the fear of losing you because of my own mistakes—is what haunts me, because I never wanted to be the person who hurt you. I am still growing, and I am still learning how to be the man you deserve. But I promise to keep trying, to keep listening, and to keep loving you through every complication. I don't need 'eternity' to be perfect; I just need it to be with you. I will stay, I will work on myself, and I will be here, holding your hand, until the very end. You are my life path, my home, and my heart."
};
        const romanNumerals = { 1: "LETTER I", 2: "LETTER II", 3: "LETTER III", 4: "LETTER IV", 5: "LETTER V", 6: "LETTER VI", 7: "THE FINAL CHAPTER" };
        let openedLetters = new Set();

        function openLetter(num) {
            const modal = document.getElementById('letterModal');
            const title = document.getElementById('modalLetterTitle');
            const content = document.getElementById('modalLetterContent');

            title.innerText = romanNumerals[num];
            content.innerText = lettersContent[num];

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);

            openedLetters.add(num);
            if (openedLetters.size === 7) {
                const trigger = document.getElementById('unlock-trigger');
                trigger.classList.remove('pointer-events-none', 'opacity-0');
                trigger.classList.add('opacity-100');
            }
        }

        function closeLetter() {
            const modal = document.getElementById('letterModal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function transitionToMemoryBox() {
            const lettersInterface = document.getElementById('journal-interface');
            const memoryInterface = document.getElementById('memory-box-interface');

            lettersInterface.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                lettersInterface.remove();
                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#f6f3eb";

                memoryInterface.classList.remove('hidden');
                setTimeout(() => memoryInterface.classList.remove('opacity-0'), 50);
            }, 1000);
        }

        function transitionTo3DBoxStage() {
            const memoryInterface = document.getElementById('memory-box-interface');
            const giftBoxStage = document.getElementById('gift-box-stage');

            memoryInterface.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                memoryInterface.remove();
                document.body.style.backgroundImage = "url('./images/download (11).jpg')";
                document.body.style.backgroundColor = "transparent";

                giftBoxStage.classList.remove('hidden');
                setTimeout(() => giftBoxStage.classList.remove('opacity-0'), 50);
            }, 1000);
        }

        // --- 3D KINETIC BOX ENGINE ---
        let boxClicks = 0;
        const targetGoal = 7;

        function handleBoxClick() {
            if (boxClicks >= targetGoal) return;
            boxClicks++;

            const fillPercent = (boxClicks / targetGoal) * 100;
            document.getElementById('heart-fill-container').style.height = `${fillPercent}%`;

            const box = document.getElementById('kinetic-3d-box');
            box.style.transform = `rotateX(${-20 + (Math.random() * 12 - 6)}deg) rotateY(${45 + (Math.random() * 16 - 8)}deg) scale(0.93)`;
            setTimeout(() => { box.style.transform = `rotateX(-20deg) rotateY(45deg)`; }, 150);

            document.getElementById('click-counter-ui').innerText = `${boxClicks} / ${targetGoal}`;

            if (boxClicks === targetGoal) {
                setTimeout(executeExplosionSequence, 400);
            }
        }

        // COORDINATE-BASED PHYSICS BURST & STREAMING GRID INJECTION ENGINE
        function executeExplosionSequence() {
            const flash = document.getElementById('whiteout-flash');
            const boxElement = document.getElementById('kinetic-3d-box');

            const boxRect = boxElement.getBoundingClientRect();
            const boxX = boxRect.left + (boxRect.width / 2);
            const boxY = boxRect.top + (boxRect.height / 2);

            flash.classList.remove('pointer-events-none');
            flash.style.opacity = '1';

            setTimeout(() => {
                document.getElementById('gift-box-stage').remove();

                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#0b090a";
                document.body.classList.remove('overflow-hidden'); // Open window scroll track lengths

                // Initialize stable infinite grid framework layout setup
                const photoWall = document.createElement('div');
                photoWall.id = 'photo-wall-stream';

                photoURLs.forEach((path) => {
                    const slot = document.createElement('div');
                    slot.className = "bg-white p-3 pb-8 shadow-md border border-stone-200/10 rounded-xs opacity-0 transform translate-y-12 transition-all duration-700 ease-out";
                    slot.style.transform = `rotate(${Math.random() * 12 - 6}deg)`;
                    slot.innerHTML = `
                        <img src="${path}" class="w-full aspect-square object-cover mb-2 rounded-xs bg-stone-900" loading="lazy">
                        <div class="w-8 h-1 bg-purple-200 mx-auto rounded-full"></div>
                    `;
                    photoWall.appendChild(slot);
                });

                document.body.appendChild(photoWall);
                document.getElementById('final-collage-footer').classList.remove('hidden');

                // Launch physical velocity rocket particle projectiles directly out of box space vector coordinates
                const burstVisualCount = 35;
                for (let i = 0; i < burstVisualCount; i++) {
                    createExplodingParticle(i, boxX, boxY);
                }

                setTimeout(() => {
                    flash.style.opacity = '0';
                    flash.classList.add('pointer-events-none');

                    photoWall.style.opacity = '1';
                    photoWall.style.transform = 'translateY(0)';

                    // Stagger grid reveal wave
                    const gridItems = photoWall.children;
                    Array.from(gridItems).forEach((item, index) => {
                        setTimeout(() => {
                            item.classList.remove('opacity-0', 'translate-y-12');
                        }, 100 + (index * 15));
                    });

                }, 400);

            }, 400);
        }

        function createExplodingParticle(index, startX, startY) {
            const particle = document.createElement('div');
            particle.className = 'burst-picture';

            const imgPath = photoURLs[index % photoURLs.length];
            particle.innerHTML = `
                <img src="${imgPath}" class="w-full aspect-square object-cover mb-2 rounded-xs bg-stone-900">
                <div class="w-6 h-1 bg-purple-400 mx-auto rounded-full"></div>
            `;

            particle.style.left = `${startX}px`;
            particle.style.top = `${startY}px`;
            particle.style.transform = `translate(-50%, -50%) scale(0.05) rotate(0deg)`;
            document.body.appendChild(particle);

            setTimeout(() => {
                const angle = Math.random() * Math.PI * 2;
                const distance = 200 + Math.random() * 350;
                const xForce = Math.cos(angle) * distance;
                const yForce = Math.sin(angle) * distance - 200;

                particle.style.opacity = '1';
                particle.style.transition = "all 0.9s cubic-bezier(0.1, 0.8, 0.25, 1)";
                particle.style.transform = `translate(calc(-50% + ${xForce}px), calc(-50% + ${yForce}px)) scale(0.8) rotate(${Math.random() * 90 - 30}deg)`;

                setTimeout(() => {
                    particle.style.transition = "opacity 0.6s ease";
                    particle.style.opacity = '0';
                    setTimeout(() => particle.remove(), 600);
                }, 900);

            }, 30);
        }

        function openBoxMemory(title, text) {
            const modal = document.getElementById('letterModal');
            document.getElementById('modalLetterTitle').innerText = title.toUpperCase();
            document.getElementById('modalLetterContent').innerText = text;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
        }
    </script>
</body>
