<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Box</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f6f3eb; /* A warm, cozy vintage book paper tone */
        }
        .serif-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="text-stone-800 antialiased min-h-screen flex flex-col items-center justify-center py-24 px-6 relative overflow-x-hidden">

    <div class="relative z-10 w-full max-w-5xl flex flex-col items-center justify-center animate-fade-in">

        <div class="max-w-4xl w-full text-center mb-16">
            <span class="serif-font italic text-stone-500 text-lg block mb-2">Our Shared Vault</span>
            <h2 class="serif-font text-3xl md:text-4xl font-semibold text-stone-900 tracking-tight">The Digital Memory Box</h2>
            <p class="text-xs uppercase tracking-widest text-rose-400 font-semibold mt-3 tracking-[0.15em]">Click on a Polaroid to uncover a hidden moment</p>
            <div class="w-12 h-px bg-stone-300 mx-auto mt-6"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-10 w-full px-4 max-w-4xl">

            <div onclick="openBoxMemory('The Sound of Your Voice', 'Even with 2,000 km between us, those quiet long-distance calls where we don\'t say anything at all and just watch movies together mean the world to me. Distance means nothing when someone means everything.')"
                 class="bg-white p-5 pb-10 shadow-md border border-stone-200/60 transform -rotate-2 hover:rotate-0 hover:scale-105 hover:shadow-xl transition-all duration-300 cursor-pointer group">
                <div class="aspect-square w-full bg-stone-100 flex items-center justify-center rounded-sm mb-4 text-stone-300 group-hover:bg-rose-50/50 group-hover:text-rose-300 transition-colors duration-300">
                    <i class="fa-regular fa-comments text-4xl"></i>
                </div>
                <p class="serif-font text-center italic text-stone-700 text-sm font-medium">Those Late Night Calls</p>
            </div>

            <div onclick="openBoxMemory('A Smile Imprinted', 'I remember our absolute funniest inside jokes and the random things that make us break into laughter instantly. Hearing you happy is my favorite soundtrack.')"
                 class="bg-white p-5 pb-10 shadow-md border border-stone-200/60 transform rotate-3 hover:rotate-0 hover:scale-105 hover:shadow-xl transition-all duration-300 cursor-pointer group">
                <div class="aspect-square w-full bg-stone-100 flex items-center justify-center rounded-sm mb-4 text-stone-300 group-hover:bg-rose-50/50 group-hover:text-rose-300 transition-colors duration-300">
                    <i class="fa-regular fa-face-smile-beam text-4xl"></i>
                </div>
                <p class="serif-font text-center italic text-stone-700 text-sm font-medium">Our Purest Laughter</p>
            </div>

            <div onclick="openBoxMemory('The Sweetest Routine', 'Every text notification with your name on it still makes my day spin around. You\'ve become my favorite habit, my dear Babbu.')"
                 class="bg-white p-5 pb-10 shadow-md border border-stone-200/60 transform -rotate-1 hover:rotate-0 hover:scale-105 hover:shadow-xl transition-all duration-300 cursor-pointer group">
                <div class="aspect-square w-full bg-stone-100 flex items-center justify-center rounded-sm mb-4 text-stone-300 group-hover:bg-rose-50/50 group-hover:text-rose-300 transition-colors duration-300">
                    <i class="fa-regular fa-heart text-4xl"></i>
                </div>
                <p class="serif-font text-center italic text-stone-700 text-sm font-medium">My Favorite Notification</p>
            </div>

        </div>

        <div id="memory-next-trigger" class="mt-20 text-center">
            <button onclick="goToTimelinePage()" class="serif-font px-10 py-3.5 bg-stone-900 text-white rounded-full text-sm tracking-wide shadow-md hover:bg-stone-800 transform hover:scale-105 active:scale-98 transition duration-300">
                Continue Our Journey <i class="fa-solid fa-chevron-right text-xs ml-2 text-rose-300"></i>
            </button>
        </div>
    </div>

    <div id="memoryBoxModal" class="fixed inset-0 bg-stone-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300 px-4">
        <div class="bg-[#fdfbf7] max-w-md w-full rounded-2xl p-8 md:p-10 shadow-2xl border border-stone-100 transform scale-95 transition-transform duration-300 relative">

            <button onclick="closeBoxMemory()" class="absolute top-5 right-5 text-stone-400 hover:text-stone-700 transition-colors">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>

            <h3 id="boxModalTitle" class="serif-font text-xl text-stone-900 font-semibold mb-4 text-center"></h3>
            <div id="boxModalBody" class="text-stone-600 text-sm font-light leading-relaxed text-center whitespace-pre-line mb-4"></div>

            <div class="w-8 h-px bg-rose-300 mx-auto mt-6"></div>
        </div>
    </div>

    <script>
        // Modal window open handling
        function openBoxMemory(title, bodyText) {
            const modal = document.getElementById('memoryBoxModal');
            document.getElementById('boxModalTitle').innerText = title;
            document.getElementById('boxModalBody').innerText = bodyText;

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
        }

        function closeBoxMemory() {
            const modal = document.getElementById('memoryBoxModal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        // Redirect flow routing logic
        function goToTimelinePage() {
            // This can forward her directly to your upcoming step!
            window.location.href = "timeline.html";
        }
    </script>
</body>
</html>
