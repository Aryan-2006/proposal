<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Forever Sign - Pisces</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020205;
        }
        .serif-font { font-family: 'Playfair Display', serif; }

        /* --- BACKGROUND INFINITE STARFIELD --- */
        #starfield-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* --- REALISTIC CELESTIAL STAR EMBELLISHMENT --- */
        @keyframes customTwinkle {
            0%, 100% { opacity: var(--base-op); transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
        }
        .constellation-star {
            position: absolute;
            z-index: 40;
            cursor: pointer;
            transform: translate(-50%, -50%);
            animation: customTwinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            transition: box-shadow 0.4s, background-color 0.4s;
        }

        /* Realistic cross flare spikes */
        .star-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 12px #ffffff, 0 0 24px rgba(255, 255, 255, 0.8), 0 0 40px rgba(0, 255, 255, 0.4);
        }
        .star-flare-h {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.85) 50%, transparent);
            border-radius: 50%;
        }
        .star-flare-v {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.85) 50%, transparent);
            border-radius: 50%;
        }

        /* --- ERROR ALERT ENGINE --- */
        .error-popup {
            position: fixed;
            color: #ff4a6b;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            pointer-events: none;
            z-index: 100;
            animation: fadeUpOut 1.2s ease-out forwards;
            text-shadow: 0 0 8px rgba(255, 74, 107, 0.6);
        }
        @keyframes fadeUpOut {
            0% { opacity: 0; transform: translate(-50%, 0); }
            15% { opacity: 1; transform: translate(-50%, -15px); }
            100% { opacity: 0; transform: translate(-50%, -35px); }
        }

        /* --- NEON SVG GLOW STRINGS --- */
        .constellation-line {
            stroke: #ffffff;
            stroke-width: 2.2;
            stroke-dasharray: 100; /* Adjusted for pathLength="100" */
            stroke-dashoffset: 100;
            animation: drawLine 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.95)) drop-shadow(0 0 15px rgba(0, 255, 255, 0.4));
        }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        .polaroid-popup { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="text-stone-300 antialiased min-h-screen relative overflow-hidden select-none">

    <canvas id="starfield-canvas"></canvas>

<div id="celestial-fish-overlay" class="absolute inset-0 z-10 pointer-events-none opacity-0 transition-opacity duration-[3000ms] flex items-center justify-center">
        <img src="./images/p1.svg" class="w-full max-w-3xl h-auto drop-shadow-[0_0_20px_rgba(34,211,238,0.4)]" alt="Pisces Constellation">
            <path d="M420,280 C360,260 380,210 400,180 C440,140 500,120 560,110 C620,100 680,120 720,150 C760,180 810,230 830,280 C790,290 730,270 680,270 C620,270 560,320 500,340 C460,330 440,300 420,280 Z" />
            <path d="M400,180 C440,200 490,220 540,210 C600,200 660,170 720,150" />
            <path d="M420,280 C460,260 520,250 580,250 C630,250 660,260 680,270" />
            <path d="M430,240 C420,220 410,210 420,195" />
            <path d="M830,280 C870,250 910,210 930,160 C900,180 860,190 840,210 C820,220 815,240 830,280 Z" />
            <path d="M720,150 C750,110 790,80 840,60 C820,90 800,120 780,140" />
            <path d="M680,270 C720,320 740,380 730,440 C750,400 770,330 780,270" />
            <path d="M500,340 C520,400 540,460 580,520 C570,460 540,400 500,340 Z" />

            <path d="M380,740 C340,715 280,710 230,710 C160,710 120,740 90,780 C110,830 150,860 200,880 C260,900 330,900 400,880 C440,860 480,820 480,770 C440,760 410,750 380,740 Z" />
            <path d="M230,710 C260,750 310,780 370,790 C420,800 460,790 480,770" />
            <path d="M90,780 C130,790 180,790 220,780 C270,770 330,755 380,740" />
            <path d="M410,840 C430,830 440,810 435,790" />
            <path d="M480,770 C530,780 580,800 640,810 C590,785 540,770 510,750 C495,740 485,750 480,770 Z" />
            <path d="M400,880 C440,920 480,950 540,970 C500,930 460,900 440,880" />
            <path d="M230,710 C210,650 180,600 140,550 C170,590 200,640 210,710 Z" />
            <path d="M200,880 C160,850 120,820 80,780 C110,810 150,840 200,880 Z" />
        </svg>
    </div>

    <svg id="line-svg" class="absolute inset-0 w-full h-full pointer-events-none z-20"></svg>

    <div id="stars-assembly-matrix" class="absolute inset-0 z-30"></div>

    <div class="relative z-50 min-h-screen flex flex-col items-center justify-between py-12 px-6 pointer-events-none">

        <div class="text-center max-w-xl mx-auto pointer-events-auto">
            <span class="serif-font italic text-cyan-400 text-sm md:text-base block mb-1 tracking-wide">Our Shared Chapters</span>
            <h1 class="serif-font text-3xl md:text-4xl font-light text-white tracking-tight">The Constellations of Us</h1>
            <p id="hud-instructions" class="text-[9px] tracking-[0.25em] uppercase text-stone-400 font-semibold mt-2">Connect the 30 shining stars sequentially to reveal the hidden map...</p>
        </div>

        <div id="proposal-centerpiece" class="opacity-0 scale-75 transform transition-all duration-[2000ms] text-center flex flex-col items-center gap-4 pointer-events-none my-auto max-w-2xl mx-auto">
            <div class="serif-font text-3xl md:text-5xl font-light tracking-wide text-white leading-tight drop-shadow-[0_0_35px_rgba(255,255,255,0.95)]">
                Will you be my better half <br>of the eternity?
            </div>
            <div class="w-20 h-px bg-white/40 my-3"></div>
            <h2 class="serif-font text-xl text-cyan-300 tracking-widest drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">Our Forever Sign - Pisces ♓</h2>
        </div>

        <div id="memoryLightbox" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-400 px-4 pointer-events-auto">
            <div class="polaroid-popup bg-white max-w-xs w-full p-4 pb-12 shadow-2xl border border-stone-200/40 transform scale-75 rounded-xs relative text-stone-800">
                <button onclick="closeMemoryLightbox()" class="absolute top-4 right-4 text-stone-400 hover:text-stone-900 transition-colors z-30">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
                <img id="popupImage" src="" class="w-full aspect-square object-cover mb-4 rounded-xs shadow-inner bg-stone-900">
                <h4 id="popupTitle" class="serif-font text-center text-lg font-semibold text-stone-900 mb-1"></h4>
                <p id="popupBody" class="text-center text-xs text-stone-500 font-light px-2 leading-relaxed"></p>
            </div>
        </div>

        <div class="text-center mt-auto z-50 pointer-events-auto">
            <button onclick="window.location.href='journal.html'" class="text-[10px] tracking-[0.25em] uppercase font-medium text-stone-500 hover:text-white transition duration-300">
                <i class="fa-solid fa-rotate-left mr-1.5 text-cyan-500/50"></i> View Letters Again
            </button>
        </div>
    </div>

    <script>
        const starSequence = [
            { id: 1, x: 10.3, y: 35.5, isMilestone: true, title: "Where It All Began", body: "The unforgettable turning point when our paths first crossed.", img: "./images/pic1.jpg" },
            { id: 2, x: 10.9, y: 38.4, isMilestone: false },
            { id: 3, x: 11.2, y: 42.5, isMilestone: false },
            { id: 4, x: 13.1, y: 44.0, isMilestone: false },
            { id: 5, x: 14.8, y: 44.5, isMilestone: false },
            { id: 6, x: 17.2, y: 45.4, isMilestone: false },
            { id: 7, x: 19.4, y: 46.1, isMilestone: false },
            { id: 8, x: 23.5, y: 48.6, isMilestone: true, title: "The Sweetest Routine", body: "Discovering your laugh and learning your favorite habits.", img: "./images/pic2.jpg" },
            { id: 9, x: 25.1, y: 55.0, isMilestone: false },
            { id: 10, x: 25.4, y: 61.2, isMilestone: false },
            { id: 11, x: 27.2, y: 69.5, isMilestone: false },
            { id: 12, x: 31.4, y: 74.0, isMilestone: false },
            { id: 13, x: 34.6, y: 76.5, isMilestone: false },
            { id: 14, x: 38.6, y: 89.5, isMilestone: true, title: "2,000 Kilometers", body: "Even across distance, we created our own quiet universe.", img: "./images/pic3.jpg" },
            { id: 15, x: 41.5, y: 86.4, isMilestone: false },
            { id: 16, x: 44.3, y: 80.2, isMilestone: false },
            { id: 17, x: 49.0, y: 59.5, isMilestone: false },
            { id: 18, x: 54.8, y: 53.0, isMilestone: false },
            { id: 19, x: 60.5, y: 46.5, isMilestone: false },
            { id: 20, x: 66.8, y: 40.2, isMilestone: false },
            { id: 21, x: 73.0, y: 32.8, isMilestone: false },
            { id: 22, x: 77.2, y: 29.5, isMilestone: true, title: "To Forever, Nandika", body: "Every memory has brought us right here. My promise of tomorrow.", img: "./images/pic4.jpg" },
            { id: 23, x: 81.2, y: 26.5, isMilestone: false },
            { id: 24, x: 84.4, y: 20.4, isMilestone: false },
            { id: 25, x: 85.8, y: 32.8, isMilestone: false },
            { id: 26, x: 88.0, y: 17.5, isMilestone: false },
            { id: 27, x: 91.2, y: 19.5, isMilestone: false },
            { id: 28, x: 93.8, y: 11.5, isMilestone: false },
            { id: 29, x: 93.4, y: 22.8, isMilestone: false },
            { id: 30, x: 94.6, y: 26.8, isMilestone: false }
        ];

        let currentActiveStep = 0;

        document.addEventListener('DOMContentLoaded', () => {
            initHighDensityBackdropSky();
            generateAnamorphicLensStars();
        });

        function initHighDensityBackdropSky() {
            const canvas = document.getElementById('starfield-canvas');
            const ctx = canvas.getContext('2d');
            let backdropDust = [];

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            for (let i = 0; i < 1800; i++) {
                backdropDust.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.4,
                    op: Math.random() * 0.8 + 0.2,
                    step: Math.random() * 0.01 + 0.003
                });
            }

            function frameLoop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                backdropDust.forEach(p => {
                    p.op += p.step;
                    if (p.op > 0.95 || p.op < 0.2) p.step = -p.step;
                    ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(p.op)})`;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                });
                requestAnimationFrame(frameLoop);
            }
            frameLoop();
        }

        function generateAnamorphicLensStars() {
            const field = document.getElementById('stars-assembly-matrix');

            starSequence.forEach((star) => {
                const wrapper = document.createElement('div');
                wrapper.id = `star-${star.id}`;
                wrapper.className = 'constellation-star';
                wrapper.style.left = `${star.x}%`;
                wrapper.style.top = `${star.y}%`;

                let size = 6;
                if (star.id === 1 || star.id === 8 || star.id === 14 || star.id === 22) size = 14;
                else if (star.id === 24 || star.id === 25 || star.id === 28 || star.id === 30) size = 10;

                wrapper.style.width = `${size * 4}px`;
                wrapper.style.height = `${size * 4}px`;

                wrapper.innerHTML = `
                    <div class="star-flare-h" style="width: ${size * 5}px;"></div>
                    <div class="star-flare-v" style="height: ${size * 5}px;"></div>
                    <div class="star-core" style="width: ${size}px; height: ${size}px;"></div>
                `;

                wrapper.style.setProperty('--base-op', Math.random() * 0.3 + 0.6);
                wrapper.style.setProperty('--duration', `${1.8 + Math.random() * 2.5}s`);
                wrapper.style.setProperty('--delay', `${Math.random() * 2}s`);

                wrapper.onclick = (e) => processSequenceChainClick(e, star);
                field.appendChild(wrapper);
            });
        }

        function processSequenceChainClick(event, star) {
            if (star.id !== currentActiveStep + 1) {
                spawnCosmicErrorPopup(event);

                const node = event.currentTarget.querySelector('.star-core');
                node.style.background = '#f43f5e';
                node.style.boxShadow = '0 0 25px #f43f5e, 0 0 50px #f43f5e';
                setTimeout(() => {
                    if (star.id > currentActiveStep) {
                        node.style.background = '#ffffff';
                        node.style.boxShadow = '0 0 12px #ffffff';
                    }
                }, 350);
                return;
            }

            const correctCore = event.currentTarget.querySelector('.star-core');
            const correctFlareH = event.currentTarget.querySelector('.star-flare-h');
            const correctFlareV = event.currentTarget.querySelector('.star-flare-v');

            correctCore.style.background = '#22d3ee';
            correctCore.style.boxShadow = '0 0 30px #22d3ee, 0 0 60px #00ffff';
            correctFlareH.style.background = 'linear-gradient(90deg, transparent, #22d3ee 50%, transparent)';
            correctFlareV.style.background = 'linear-gradient(180deg, transparent, #22d3ee 50%, transparent)';
            event.currentTarget.style.pointerEvents = 'none';

            if (star.isMilestone) {
                const modal = document.getElementById('memoryLightbox');
                document.getElementById('popupImage').src = star.img;
                document.getElementById('popupTitle').innerText = star.title;
                document.getElementById('popupBody').innerText = star.body;

                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modal.querySelector('.polaroid-popup').classList.remove('scale-75');
                }, 10);
            }

            if (currentActiveStep > 0) {
                drawNeonConstellationStrut(starSequence[currentActiveStep - 1], star);
            }

            currentActiveStep = star.id;
            updateConsoleLogsHUD();

            if (currentActiveStep === starSequence.length && !star.isMilestone) {
                setTimeout(revealCelestialFishesAndProposal, 500);
            }
        }

        function spawnCosmicErrorPopup(e) {
            const popup = document.createElement('div');
            popup.className = 'error-popup';
            popup.innerText = "Selection Error: Cosmic Path Misaligned";
            popup.style.left = `${e.clientX}px`;
            popup.style.top = `${e.clientY}px`;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 1200);
        }

        function closeMemoryLightbox() {
            const modal = document.getElementById('memoryLightbox');
            modal.classList.add('opacity-0');
            modal.querySelector('.polaroid-popup').classList.add('scale-75');
            setTimeout(() => { modal.classList.add('hidden'); }, 400);

            if (currentActiveStep === starSequence.length) {
                setTimeout(revealCelestialFishesAndProposal, 500);
            }
        }

        function updateConsoleLogsHUD() {
            const hud = document.getElementById('hud-instructions');
            if (currentActiveStep === starSequence.length) {
                hud.innerText = "The Celestial bonds are tied. Our universe is infinite.";
                hud.classList.add('text-white');
            } else {
                hud.innerText = `Star link ${currentActiveStep} bound to the heavens. Tap the next sequential node...`;
            }
        }

        // --- THE FIX: Using Pure Percentages for the Line Drawing ---
        function drawNeonConstellationStrut(nA, nB) {
            const svg = document.getElementById('line-svg');
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');

            line.setAttribute('x1', `${nA.x}%`);
            line.setAttribute('y1', `${nA.y}%`);
            line.setAttribute('x2', `${nB.x}%`);
            line.setAttribute('y2', `${nB.y}%`);

            line.setAttribute('pathLength', '100');
            line.setAttribute('class', 'constellation-line');

            svg.appendChild(line);
        }

        function revealCelestialFishesAndProposal() {
            document.getElementById('celestial-fish-overlay').classList.replace('opacity-0', 'opacity-100');

            const proposal = document.getElementById('proposal-centerpiece');
            proposal.classList.remove('opacity-0', 'scale-75');
            proposal.classList.add('opacity-100', 'scale-100');
        }
    </script>
</body>
</html>
